name: CI-CD

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/clinica-odontologica-mariana/com-frontend

jobs:
  build:
    name: Build Frontend
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  docker-build:
    name: Validate Docker Image Build
    if: github.event_name != 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            com-frontend:ci
            com-frontend:${{ github.sha }}

  docker-publish:
    name: Publish Docker Image to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-production:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS with retry
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          SSH_OPTS=(
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=20
            -p "$VPS_PORT"
          )

          upload_bundle() {
            tar -czf - -C deploy/production/frontend . | \
              sshpass -p "$VPS_PASSWORD" ssh "${SSH_OPTS[@]}" "$VPS_USERNAME@$VPS_HOST" \
                "mkdir -p /opt/marianadias/frontend && tar -xzf - -C /opt/marianadias/frontend"
          }

          update_remote() {
            sshpass -p "$VPS_PASSWORD" ssh "${SSH_OPTS[@]}" "$VPS_USERNAME@$VPS_HOST" "
              set -eu
              cd /opt/marianadias/frontend
              test -f .env
              echo '$GITHUB_TOKEN' | docker login ghcr.io -u '$GITHUB_REPOSITORY_OWNER' --password-stdin
              docker compose --env-file .env -f docker-compose.prod.yml pull
              docker compose --env-file .env -f docker-compose.prod.yml up -d
            "
          }

          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt $attempt/5"

            if upload_bundle && update_remote; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Deploy failed after 5 attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Deploy attempt $attempt failed. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
