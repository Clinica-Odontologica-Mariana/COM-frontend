name: E2E — Testes de Interface (Semanal)

# Roda toda segunda-feira às 08:00 UTC (05:00 BRT).
# Também pode ser disparado manualmente via Actions → "Run workflow".
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: e2e-weekly
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Secrets necessários (configure em Settings → Secrets → Actions):
#
#   PAT_BACKEND_REPO     — Personal Access Token com acesso de leitura ao repo
#                          Clinica-Odontologica-Mariana/COM-backend
#   BACKEND_ENV          — Conteúdo completo do .env do backend
#                          (copie o arquivo .env do projeto backend)
#   E2E_ADMIN_USERNAME   — Usuário admin de teste (ex.: api-admin)
#   E2E_ADMIN_PASSWORD   — Senha do usuário admin de teste
#   KEYCLOAK_CLIENT_SECRET — client_secret do Keycloak (ex.: rest-ms-api-secret)
# ---------------------------------------------------------------------------

jobs:
  e2e:
    name: Selenium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BACKEND_API_URL:       http://localhost:8080/api/v1
      KEYCLOAK_EXTERNAL_URL: http://localhost:8080
      KEYCLOAK_REALM:        rest-ms
      KEYCLOAK_CLIENT_ID:    rest-ms-api
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      E2E_BASE_URL:          http://localhost:4200
      E2E_HEADLESS:          'true'
      E2E_ADMIN_USERNAME:    ${{ secrets.E2E_ADMIN_USERNAME }}
      E2E_ADMIN_PASSWORD:    ${{ secrets.E2E_ADMIN_PASSWORD }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Código fonte
      # -----------------------------------------------------------------------
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          # Ajuste o nome do repo se for diferente de COM-backend
          repository: Clinica-Odontologica-Mariana/COM-backend
          token: ${{ secrets.PAT_BACKEND_REPO }}
          path: COM-backend

      # -----------------------------------------------------------------------
      # 2. Backend — criar .env e subir serviços via Docker Compose
      # -----------------------------------------------------------------------
      - name: Criar .env do backend
        working-directory: COM-backend
        run: |
          printf '%s' "${{ secrets.BACKEND_ENV }}" > .env
          echo "✔ .env criado ($(wc -l < .env) linhas)"

      - name: Iniciar serviços do backend
        working-directory: COM-backend
        run: docker compose up -d
        timeout-minutes: 10

      - name: Aguardar Spring Boot estar pronto
        run: |
          echo "Aguardando backend em http://localhost:8080 ..."
          for i in $(seq 1 30); do
            # Tenta actuator/health primeiro, depois raiz do contexto
            if curl -sf --max-time 3 http://localhost:8080/actuator/health 2>/dev/null \
                | grep -qi '"status"\s*:\s*"UP"'; then
              echo "✔ Backend pronto via /actuator/health (tentativa $i)"
              exit 0
            fi
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 \
                     http://localhost:8080/api/v1/ 2>/dev/null || echo "000")
            if [[ "$CODE" != "000" && "$CODE" != "502" && "$CODE" != "503" ]]; then
              echo "✔ Backend respondendo em /api/v1/ — HTTP $CODE (tentativa $i)"
              exit 0
            fi
            echo "  tentativa $i/30 — HTTP $CODE, aguardando 10s..."
            sleep 10
          done
          echo "✗ Backend não respondeu em 5 minutos. Logs:"
          docker compose -f COM-backend/docker-compose.yml logs --tail=80 2>/dev/null \
            || docker compose --project-directory COM-backend logs --tail=80
          exit 1

      # -----------------------------------------------------------------------
      # 3. Frontend — instalar deps e iniciar ng serve
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências do frontend
        run: npm ci

      - name: Iniciar Angular dev server
        run: npm start -- --no-open &
        env:
          CI: 'false'   # evita que o Angular encerre ao detectar ambiente CI

      - name: Aguardar Angular estar pronto
        run: |
          echo "Aguardando frontend em http://localhost:4200 ..."
          for i in $(seq 1 36); do
            if curl -sf --max-time 4 http://localhost:4200 2>/dev/null \
                | grep -qE 'app-root|<!DOCTYPE|<html'; then
              echo "✔ Frontend pronto (tentativa $i)"
              exit 0
            fi
            echo "  tentativa $i/36, aguardando 5s..."
            sleep 5
          done
          echo "✗ Frontend não respondeu em 3 minutos."
          exit 1

      # -----------------------------------------------------------------------
      # 4. Python — deps, seed, testes
      # -----------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: e2e/requirements.txt

      - name: Instalar dependências E2E
        working-directory: e2e
        run: pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Criar diretório de relatórios
        run: mkdir -p e2e/reports

      - name: Seed de dados de teste
        working-directory: e2e
        run: python3 seed_data.py

      - name: Rodar testes E2E
        working-directory: e2e
        # pytest falha → job marcado como falha → GitHub notifica por e-mail.
        # O upload de artefato usa "if: always()" para garantir que o relatório
        # seja salvo mesmo quando testes falham.
        run: >
          pytest
          --html=reports/report.html
          --self-contained-html
          -v
          --tb=short

      # -----------------------------------------------------------------------
      # 5. Artefatos e limpeza
      # -----------------------------------------------------------------------
      - name: Upload relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_number }}-${{ github.run_attempt }}
          path: e2e/reports/
          retention-days: 30

      - name: Dump logs do backend (somente em falha)
        if: failure()
        working-directory: COM-backend
        run: docker compose logs --tail=150

      - name: Encerrar serviços do backend
        if: always()
        working-directory: COM-backend
        run: docker compose down -v
