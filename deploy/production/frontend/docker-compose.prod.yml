services:
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: marianadias-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL}
      PORT: ${PORT:-4000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${PORT:-4000}/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - webproxy

networks:
  webproxy:
    external: true
