[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
markers =
    smoke: Testes críticos de smoke (subconjunto rápido)
    auth: Testes de autenticação
    public: Testes de páginas públicas
    patients: Testes de pacientes
    schedule: Testes de agenda
    clinics: Testes de clínicas
    medical_records: Testes de prontuários
    inventories: Testes de estoque
    navigation: Testes de navegação
    accessibility: Testes de acessibilidade
